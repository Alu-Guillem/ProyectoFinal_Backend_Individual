<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Reserva cancelada</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            color: #222;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .box {
            background: #fde8e8;
            padding: 14px;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Tu reserva ha sido cancelada</h2>
        <div class="box">
            <p><strong>Cliente:</strong> {{name}}</p>
            <p><strong>Nº Reserva:</strong> {{bookingId}}</p>
            <p><strong>Habitación:</strong> {{roomName}}</p>
            <p><strong>Motivo:</strong> {{cancelReason}}</p>
            <p><strong>Reembolso:</strong> {{refundAmount}}</p>
        </div>
        <p>Si no solicitaste esta cancelación, contáctanos.</p>
    </div>
</body>

</html>
