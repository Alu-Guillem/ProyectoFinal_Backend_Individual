<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Recuperación de contraseña</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            color: #222;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .code {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 2px;
            background: #f5f7fb;
            padding: 10px;
            border-radius: 8px;
            display: inline-block;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Hola, {{name}}</h2>
        <p>Usa el siguiente código para recuperar tu contraseña:</p>
        <p class="code">{{code}}</p>
        <p>Este código caduca en {{expireMinutes}} minutos.</p>
        <p>Si no solicitaste el cambio, ignora este correo.</p>
    </div>
</body>

</html>
