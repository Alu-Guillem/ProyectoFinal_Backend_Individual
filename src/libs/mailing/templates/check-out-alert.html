<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Recordatorio de Check-out</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            color: #222;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .box {
            background: #fff5e6;
            padding: 14px;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Recordatorio de Check-out</h2>
        <div class="box">
            <p><strong>Cliente:</strong> {{name}}</p>
            <p><strong>Nº Reserva:</strong> {{bookingId}}</p>
            <p><strong>Habitación:</strong> {{roomName}}</p>
            <p><strong>Fecha de Check-out:</strong> {{checkOut}}</p>
        </div>
        <p>Gracias por tu estancia. Esperamos verte pronto.</p>
    </div>
</body>

</html>
