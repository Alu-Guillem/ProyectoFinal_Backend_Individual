<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Pago realizado con éxito</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            color: #222;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .box {
            background: #e8f7ee;
            padding: 14px;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>¡Pago confirmado!</h2>
        <div class="box">
            <p><strong>Cliente:</strong> {{name}}</p>
            <p><strong>Nº Reserva:</strong> {{bookingId}}</p>
            <p><strong>Importe:</strong> {{amount}}</p>
            <p><strong>Método de pago:</strong> {{paymentMethod}}</p>
            <p><strong>Fecha:</strong> {{date}}</p>
        </div>
        <p>Gracias por tu pago.</p>
    </div>
</body>

</html>
